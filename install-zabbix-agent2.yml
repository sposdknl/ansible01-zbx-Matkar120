- name: Install Zabbix Agent2 via Role
  ansible.builtin.include_role:
    name: community.zabbix.zabbix_agent2
  vars:
    zabbix_agent_version: 7.0
    zabbix_agent2: true
    zabbix_agent_hostname: "bastion"
    zabbix_agent_listenip: "{{ ansible_host }}"
    # Zabbix server je teď váš appliance
    zabbix_agent_server: "192.168.56.10"
    zabbix_agent_serveractive: 192.168.56.10
    zabbix_agent_host_state: present
    zabbix_agent_hostmetadata: "Bastion-VM"