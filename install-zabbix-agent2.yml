---
- name: Install Zabbix Agent 2 (7.0 LTS) via community.zabbix role
  hosts: bastion_hosts
  become: yes

  vars:
    # Základní nastavení
    zabbix_version: "7.0"
    zabbix_agent2: true                    # ← instaluje Agent 2
    zabbix_agent_version: "7.0"

    # Připojení k Zabbix Appliance
    zabbix_agent_server: "192.168.56.10"
    zabbix_agent_serveractive: "192.168.56.10"

    # Host identifikace
    zabbix_agent_hostname: "{{ inventory_hostname }}"

    # HostMetadata – důležité pro auto-registrační pravidlo v Zabbixu
    zabbix_agent_hostmetadata: "linux-bastion-ansible:env=lab:role=ansible-bastion:os=ubuntu"

    # Další nastavení
    zabbix_agent_listenip: "0.0.0.0"
    zabbix_agent_listenport: 10050
    zabbix_agent_host_state: present
    zabbix_agent_enabled: true

  tasks:
    - name: Install community.zabbix collection (if not present)
      ansible.builtin.command:
        cmd: ansible-galaxy collection install community.zabbix --force
      changed_when: false

    - name: Include Zabbix Agent role
      ansible.builtin.include_role:
        name: community.zabbix.zabbix_agent

    - name: Ensure Zabbix Agent 2 service is enabled and running
      ansible.builtin.systemd:
        name: zabbix-agent2
        enabled: yes
        state: restarted
        daemon_reload: yes